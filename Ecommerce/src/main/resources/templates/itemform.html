<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Signup</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div style="width: 400px; background-color:lightgray; margin:0 auto;  ">
 <div class="container mt-3">
  <h2>Item form</h2>
   <p th:text="${msg}" style="color: green;"> </p>
  <form action="itemsub" method="post" enctype="multipart/form-data">
   <div class="mb-3 mt-3">
      <label for="name">Name:</label>
      <input type="text" class="form-control" id="name" placeholder="Enter name" name="name">
    </div>
    
    <div class="mb-3 mt-3">
      <label for="brand">Brand:</label>
      <input type="text" class="form-control" id="brand" placeholder="Enter brand" name="brand">
    </div>
    
    <div class="mb-3 mt-3">
      <label for="category">Category:</label>
      <input type="number" class="form-control" id="category" placeholder="Enter category" name="category">
    </div>
    
    <div class="mb-3 mt-3">
      <label for="image">Image:</label>
      <input type="file" class="form-control" id="address" placeholder="Enter image" name="productImage">
    </div>
    
      <div class="mb-3 mt-3">
       <label for="image1">Image:</label>
      <input type="file" class="form-control" id="address" placeholder="Enter image" name="productImage2">
    </div>
    
    <div class="mb-3">
      <label for="price">Price:</label>
      <input type="number" class="form-control" id="price" placeholder="Enter price" name="price">
    </div>
    
    <div class="mb-3">
      <label for="discount">Discount:</label>
      <input type="number" class="form-control" id="discount" placeholder="Enter discount" name="discount">
    </div>
    
    <div class="mb-3">
      <label for="rating">Rating:</label>
      <input type="number" class="form-control" id="rating" placeholder="Enter rating" name="rating">
    </div>
    
    <div class="mb-3">
      <label for="review">Review:</label>
      <input type="text" class="form-control" id="review" placeholder="Enter review" name="review">
    </div>
    
    <div class="mb-3">
      <label for="status">Status:</label>
      <input type="number" class="form-control" id="status" placeholder="Enter status" name="status">
    </div>
    
    <div class="mb-3">
      <label for="description">Description:</label>
      <input type="text" class="form-control" id="description" placeholder="Enter description" name="description">
    </div>
    
    <div class="form-check mb-3">
      <label class="form-check-label">
        <input class="form-check-input" type="checkbox" name="remember"> Remember me
      </label>
    </div>
    
    <div style="text-align: center;">
    	<button type="submit" class="btn btn-primary">Submit</button>
    
    </div>
  </form>
</div>
</div>

</body>
</html>
