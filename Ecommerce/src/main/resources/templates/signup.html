<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Signup</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div style="width: 400px; background-color:lightgray; margin:0 auto;  ">
 <div class="container mt-3">
  <h2>Signup form</h2>
   <p th:text="${msg}" style="color: green;"> </p>
  <form action="signupUser" method="post">
   <div class="mb-3 mt-3">
      <label for="name">Name:</label>
      <input type="text" class="form-control" id="name" placeholder="Enter name" name="name">
    </div>
    <div class="mb-3 mt-3">
      <label for="email">Email:</label>
      <input type="email" class="form-control" id="email" placeholder="Enter email" name="email">
    </div>
    <div class="mb-3 mt-3">
      <label for="phone_no">Phone_No:</label>
      <input type="phone_no" class="form-control" id="phone_no" placeholder="Enter phone_no" name="phone_no">
    </div>
    <div class="mb-3 mt-3">
      <label for="address">Address:</label>
      <input type="text" class="form-control" id="address" placeholder="Enter address" name="address">
    </div>
    <div class="mb-3 mt-3">
      <label for="pincode">PinCode:</label>
      <input type="number" class="form-control" id="pincode" placeholder="Enter pincode" name="pinCode">
    </div>
    <div class="mb-3">
      <label for="password">Password:</label>
      <input type="password" class="form-control" id="password" placeholder="Enter password" name="password">
    </div>
    <div class="form-check mb-3">
      <label class="form-check-label">
        <input class="form-check-input" type="checkbox" name="remember"> Remember me
      </label>
    </div>
    <div style="text-align: center;">
    	<button type="submit" class="btn btn-primary">Sign up</button>
    
    <a href="/login">
    <button type="button" class="btn btn-primary">Log-in</button>
    </a>
    </div>
  </form>
</div>
</div>

</body>
</html>
